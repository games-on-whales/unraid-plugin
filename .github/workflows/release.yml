name: release

on:
  push:
    tags:
      - '[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9]'   # e.g. 2026.04.10

jobs:
  build-settings-ui:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build settings-ui package
        run: |
          TAG="${GITHUB_REF_NAME}"
          chmod +x utils/fmakepkg.sh
          mkdir -p dist
          cd packages/settings-ui/root
          ../../../utils/fmakepkg.sh ../../../dist/settings-ui.txz

      - name: Generate checksums
        run: |
          sha256sum dist/settings-ui.txz | awk '{print $1}' > dist/settings-ui.txz.sha256
          md5sum    dist/settings-ui.txz | awk '{print $1}' > dist/settings-ui.txz.md5

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: settings-ui
          path: dist/

  release:
    needs: build-settings-ui
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download built package
        uses: actions/download-artifact@v4
        with:
          name: settings-ui
          path: dist/

      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "dist/settings-ui.txz,dist/settings-ui.txz.sha256,dist/settings-ui.txz.md5,gow.plg"
          tag: ${{ github.ref_name }}
          commit: ${{ github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
          generateReleaseNotes: true
